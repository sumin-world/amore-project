services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./src:/app/src
      - ./data:/data
      - ./snapshots:/snapshots
      - ./reports:/reports
      - ./logs:/logs
    shm_size: "2gb"
    command: ["bash", "-lc", "python -m src.main"]

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./src:/app/src
      - ./data:/data
      - ./reports:/reports
    shm_size: "2gb"
    ports:
      - "127.0.0.1:8501:8501"
    command: ["bash", "-lc", "streamlit run src/dashboard.py --server.address 0.0.0.0 --server.port 8501"]

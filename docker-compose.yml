services:
  app:
    build: .
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - DATABASE_URL=sqlite+pysqlite:///./data/market_insight.db
      - DEMO_MODE=true
      - REQUEST_SLEEP_SEC=1.2
      # Uncomment and set API keys for LLM-powered reports:
      # - USE_GROQ=true
      # - GROQ_API_KEY=your_key_here
      # - USE_CLAUDE=false
      # - ANTHROPIC_API_KEY=your_key_here
    restart: unless-stopped
